function buildProcLists(){
  const grid=$('proc-grid');
  const cols=[
    {tier:1,title:'Grupa 1',sub:'Kosmetyka i Fryzjerstwo',procs:TIER1_PROCS},
    {tier:2,title:'Grupa 2',sub:'Kosmetologia i Tatuaż',procs:TIER2_PROCS},
    {tier:3,title:'Grupa 3',sub:'Podologia Medyczna',procs:TIER3_PROCS},
  ];
  cols.forEach(c=>{
    const col=el('div','border border-slate-200 rounded-2xl overflow-hidden flex flex-col bg-white shadow-sm');
    col.innerHTML=`<div class="bg-slate-50 p-3 border-b border-slate-200 flex justify-between items-center">
      <div>
        <h3 class="font-bold text-sm text-beauty-navy">${c.title}</h3>
        <p class="text-[9px] text-slate-500 uppercase tracking-widest mt-0.5">${c.sub}</p>
      </div>
      <button type="button" onclick="selectAll(${c.tier})" class="text-[9px] text-beauty-navy border border-slate-300 bg-white px-2.5 py-1 rounded-full hover:border-beauty-navy hover:bg-rose-50 transition-colors font-bold shadow-sm focus:ring-2 focus:ring-beauty-navy outline-none">Wszystkie</button>
    </div>
    <div class="p-2 h-[300px] overflow-y-auto custom-scrollbar" id="list-${c.tier}-container"></div>`;
    grid.appendChild(col);

    const container=col.querySelector(`#list-${c.tier}-container`);
    c.procs.forEach(p=>{
      const lbl=el('label','procedure-checkbox');
      lbl.innerHTML=`<input type="checkbox" class="tier-checkbox" data-tier="${c.tier}" onchange="updateCalculator()"><span>${p}</span>`;
      container.appendChild(lbl);
    });
  });

  // Tier 4
  const t4=el('div','p-3 grid md:grid-cols-2 lg:grid-cols-4 gap-2');
  t4.id='list-4-container';
  TIER4_PROCS.forEach(p=>{
    const lbl=el('label','procedure-checkbox');
    lbl.innerHTML=`<input type="checkbox" class="tier-checkbox" data-tier="4" onchange="updateCalculator()"><span>${p}</span>`;
    t4.appendChild(lbl);
  });
  const existing=$('list-4-container');
  if(existing) existing.replaceWith(t4);
}

// ══════════════════════════════════════════
//  CALCULATOR LOGIC (mirrors index.html)
// ══════════════════════════════════════════
function selectAll(tierId){
  const container=$(`list-${tierId}-container`);
  if(!container) return;
  const cbs=container.querySelectorAll('input[type=checkbox]');
  let allChecked=true;
  cbs.forEach(cb=>{ if(!cb.checked) allChecked=false; });
  cbs.forEach(cb=>{ cb.checked=!allChecked; });
  updateCalculator();
}

function updateCalculator(){
  const allCBs=qsa('.tier-checkbox');
  let hasTier1=false,hasTier2=false,hasTier3=false,hasHighRisk=false,checked=0;
  allCBs.forEach(cb=>{
    if(cb.checked){
      checked++;
      const t=parseInt(cb.getAttribute('data-tier'));
      if(t===1) hasTier1=true;
      if(t===2) hasTier2=true;
      if(t===3) hasTier3=true;
      if(t===4) hasHighRisk=true;
    }
  });

  const step2=$('step-2');
  const resSec=$('results-section');

  if(checked===0){
    step2.classList.add('opacity-40','pointer-events-none','translate-y-4');
    step2.classList.remove('opacity-100','translate-y-0');
    resSec.classList.add('opacity-0','translate-y-8','hidden');
    resSec.classList.remove('opacity-100','translate-y-0');
    confettiFired=false;
    return;
  }

  step2.classList.remove('opacity-40','pointer-events-none','translate-y-4');
  step2.classList.add('opacity-100','translate-y-0');
  resSec.classList.remove('hidden');
  setTimeout(()=>{
    resSec.classList.remove('opacity-0','translate-y-8');
    resSec.classList.add('opacity-100','translate-y-0');
  },80);

  // Determine tier
  let finalTier=1, taryfaName='';
  if(hasTier3){ finalTier=3; taryfaName='Gabinety Podologiczne (Pakiet Pełny)'; }
  else if(hasTier1&&hasTier2){ finalTier=3; taryfaName='Pakiet Łączony (Kosmetyka + Kosmetologia)'; }
  else if(hasTier2){ finalTier=2; taryfaName='Gabinety Kosmetologiczne'; }
  else if(hasTier1){ finalTier=1; taryfaName='Gabinety Kosmetyczne i Fryzjerskie'; }

  const empRadios=document.getElementsByName('employees');
  let empValue=null;
  for(const r of empRadios){ if(r.checked){ empValue=r.value; break; } }

  const hasLegal=$('legal-protection').checked;
  const legalCost=hasLegal?LEGAL:0;

  const cardsContainer=$('pricing-cards-container');
  const indMsg=$('individual-pricing-msg');
  const indReason=$('ind-pricing-reason');
  $('detected-tier-msg').innerHTML=`<span class="text-beauty-navy">${taryfaName}</span>`;

  if(empValue==='ind'||hasHighRisk){
    cardsContainer.classList.add('hidden');
    indMsg.classList.remove('hidden');
    if(hasHighRisk){
      indReason.innerText='Wybrałaś zabiegi specjalistyczne (Grupa 4), które wymagają indywidualnej oceny ryzyka przez ubezpieczyciela ERGO Hestia. Wypełnij ankietę, abyśmy mogli wynegocjować dla Ciebie najlepszą stawkę.';
      taryfaName='Wycena Indywidualna (Zabiegi Specjalistyczne)';
    } else {
      indReason.innerText='Ze względu na dużą skalę działalności (powyżej 8 osób) przygotujemy dla Ciebie taryfę szytą na miarę.';
      taryfaName='Wycena Indywidualna (9+ osób)';
    }
    $('btn-ind').setAttribute('onclick',`openOfferModal('Wycena Indywidualna','Brak ceny – wymaga weryfikacji','${taryfaName}')`);
  } else {
    cardsContainer.classList.remove('hidden');
    indMsg.classList.add('hidden');

    const mult=parseFloat(empValue);
    const prices=basePricing[finalTier];

    const p100=Math.round((prices.s100*mult)+legalCost);
    const p200=Math.round((prices.s200*mult)+legalCost);
    const p300=Math.round((prices.s300*mult)+legalCost);

    $('price-100k').innerText=p100;
    $('price-200k').innerText=p200;
    $('price-300k').innerText=p300;

    $('btn-100k').setAttribute('onclick',`openOfferModal('100 000 zł','${p100} zł','${taryfaName}')`);
    $('btn-200k').setAttribute('onclick',`openOfferModal('200 000 zł','${p200} zł','${taryfaName}')`);
    $('btn-300k').setAttribute('onclick',`openOfferModal('300 000 zł','${p300} zł','${taryfaName}')`);
  }
}

function openOfferModal(variant,price,taryfaName){
  $('modal-chosen-variant').innerText=variant;
  $('modal-chosen-price').innerText=price;
  $('form-hidden-variant').value=variant;
  $('form-hidden-price').value=price;
  $('form-hidden-taryfa').value=taryfaName;
  openModal('modal-offer');
  clearModalAlert();

async function submitOffer(e){
  e.preventDefault();
  const btn=$('submit-offer-btn');
  btn.innerHTML='Przetwarzanie…'; btn.disabled=true;

  // Collect checked procedures
  const cbs=qsa('.tier-checkbox:checked');
  let groups={1:[],2:[],3:[],4:[]};
  cbs.forEach(cb=>{
    const t=cb.getAttribute('data-tier');
    groups[t].push(cb.nextElementSibling.innerText);
  });
  let procsText='';
  [1,2,3,4].forEach(g=>{ if(groups[g].length) procsText+=`--- GRUPA ${g} ---\n${groups[g].join('\n')}\n\n`; });

  const empR=document.querySelector('input[name=employees]:checked');
  const empLabel=empR?.nextElementSibling?.querySelector('span.font-bold')?.innerText||'—';

  // Save to Supabase
  const email=$('offer-email').value;
  const phone=$('offer-phone').value;
  const regon=$('regon-input').value;

  const {error}=await sb.from('bp_quotes').insert({
    user_id:_user?.id||null,
    email, phone,
    specialization:$('form-hidden-taryfa').value,
    sum_insured: parseInt(($('form-hidden-variant').value.replace(/\s/g,'').replace('zł',''))||0)||100000,
    annual_premium: parseInt(($('form-hidden-price').value.replace(/\D/g,''))||0)||null,
    status:'new',
    notes:`REGON: ${regon}\nPracownicy: ${empLabel}\nOchrona prawna: ${$('legal-protection').checked?'TAK':'NIE'}\n\nZabiegi:\n${procsText}`
  });

  btn.innerHTML='Wybieram wariant'; btn.disabled=false;

  if(error){
    showModalAlert('Błąd podczas wysyłania. Spróbuj ponownie.','error');
  } else {
    showModalAlert('Dziękujemy! Twój wniosek został przyjęty. Skontaktujemy się wkrótce.','success');
    setTimeout(()=>{ closeModal('modal-offer'); $('offer-form').reset(); },2800);
  }
}

function switchAuthForm(type){
  const lf=$('auth-login-form');
  const rf=$('auth-register-form');
  if(lf) lf.style.display=type==='login'?'block':'none';
  if(rf) rf.style.display=type==='register'?'block':'none';
  clearModalAlert();
}

async function doLogin(){
  const email=$('auth-email').value;
  const pass=$('auth-pass').value;
  if(!email||!pass){ showModalAlert('Uzupełnij e-mail i hasło.','error'); return; }
  const btn=$('auth-login-btn');
  btn.textContent='Logowanie…'; btn.disabled=true;
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  btn.textContent='Zaloguj się'; btn.disabled=false;
  if(error){ showModalAlert(error.message==='Invalid login credentials'?'Nieprawidłowy e-mail lub hasło.':error.message,'error'); }
  else { _user=data.user; closeModal('modal-auth'); updateNavAuth(); }
}

async function doRegister(){
  const name=$('reg-name').value;
  const email=$('reg-email').value;
  const pass=$('reg-pass').value;
  const phone=$('reg-phone').value;
  if(!name||!email||!pass){ showModalAlert('Uzupełnij wymagane pola.','error'); return; }
  if(pass.length<8){ showModalAlert('Hasło musi mieć co najmniej 8 znaków.','error'); return; }
  const btn=$('auth-register-btn');
  btn.textContent='Tworzę konto…'; btn.disabled=true;
  const {error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name,phone}}});
  btn.textContent='Utwórz konto'; btn.disabled=false;
  if(error){ showModalAlert(error.message,'error'); }
  else { showModalAlert('Konto zostało utworzone! Sprawdź e-mail, aby potwierdzić rejestrację.','success'); setTimeout(()=>closeModal('modal-auth'),3000); }
}

async function doLogout(){

function showModalAlert(msg,type){
  const a=$('modal-alert');
  if(!a) return;
  a.textContent=msg;
  a.className=type==='error'
    ?'alert-msg alert-error'
    :'alert-msg alert-success';
  a.style.display='block';
}
function clearModalAlert(){
  const a=$('modal-alert');
  if(a){ a.style.display='none'; a.textContent=''; }
}
